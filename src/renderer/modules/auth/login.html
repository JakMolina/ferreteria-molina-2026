<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Ferretería Molina</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f0f2f5;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.2s;
        }

        .brand-header { margin-bottom: 32px; }
        
        .brand-logo { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--primary-color); 
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: inline-block;
        }
        
        .brand-header h2 {
            margin: 0;
            color: var(--text-dark);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .brand-header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover { background-color: var(--primary-hover); }
        .btn-login:disabled { background-color: var(--text-muted); cursor: not-allowed; }

        #msg {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 1.2em;
            font-weight: 500;
        }
        .error-msg { color: #dc2626; background: #fef2f2; padding: 8px; border-radius: 8px; }
        .success-msg { color: #16a34a; background: #f0fdf4; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <span class="brand-logo">FM</span>
            <h2>Iniciar Sesión</h2>
            <p>Sistema Ferretería Molina v2026</p>
        </div>

        <div class="form-group">
            <label class="form-label" for="username">Usuario</label>
            <input id="username" type="text" class="form-input" placeholder="Ej. admin" autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input id="password" type="password" class="form-input" placeholder="••••••••">
        </div>
            
        <button id="btnLogin" class="btn-login">
            Ingresar al Sistema
        </button>

        <div id="msg"></div>
    </div>

    <script src="./login.js"></script>
</body>
</html>
