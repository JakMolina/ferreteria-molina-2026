<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>POS - Ferretería Molina</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        .pos-layout {
            display: grid; 
            grid-template-columns: 1fr 380px; 
            gap: 20px; 
            height: calc(100vh - 100px);
        }
        .pos-left { display: flex; flex-direction: column; gap: 20px; }
        .pos-right { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        
        .total-box {
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 20px;
            text-align: right;
        }
        .total-amount { font-size: 2.5rem; font-weight: 800; color: var(--success); line-height: 1; }
        
        
        .doc-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .doc-option { 
            flex: 1; text-align: center; padding: 10px; 
            border: 1px solid var(--border-light); border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 13px; color: var(--text-muted);
            transition: all 0.2s;
        }
        input[type="radio"]:checked + .doc-option {
            background: rgba(37,99,235,0.1); border-color: var(--primary); color: var(--primary);
        }
        input[type="radio"] { display: none; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand"><div class="logo">FM</div><h2>Ferretería Molina</h2></div>
            <nav class="menu">
                <a href="../home/index.html">🏠 Inicio</a>
                <a href="../products/list.html">📦 Productos</a>
                <a href="../sales/daily.html">🧾 Ventas</a>
                <a href="../providers/list.html">👥 Proveedores</a>
                <a href="../users/list.html">👤 Usuarios</a>
                <a href="../sales/history.html">📊 Historial</a>
                <a href="../settings/settings.html">⚙ Configuración</a>
                <a href="../auth/login.html" class="btn-logout">🔓 Salir</a>
            </nav>
        </aside>

        <main class="main">
            <div class="header">
                <div class="title">
                    <h1>Punto de Venta</h1>
                    <p id="dateDisplay">Fecha...</p>
                </div>
                <a href="history.html" class="btn btn-ghost">📊 Ver Ventas Hoy</a>
            </div>

            <div class="pos-layout">
                <div class="pos-left">
                    <div class="card">
                        <h3 class="font-bold text-muted mb-4">Agregar Ítem</h3>
                        <form id="addItemForm" class="form-grid">
                            <div class="form-group" style="grid-column: 1/-1;">
                                <label>Producto (Buscar)</label>
                                <select id="productSelect" style="width:100%;"></select>
                            </div>
                            
                            <div class="form-group">
                                <label>Stock Disp.</label>
                                <div id="stockDisplay" class="text-muted font-bold">-</div>
                            </div>
                            
                            <div class="form-group">
                                <label>Precio Unit.</label>
                                <input id="priceInput" type="number" step="0.01">
                                <small id="minPriceHelp" style="font-size:11px;"></small>
                            </div>
                            
                            <div class="form-group">
                                <label>Cantidad</label>
                                <input id="quantity" type="number" min="1" value="1">
                            </div>

                            <button type="button" id="btnAdd" class="btn btn-primary w-full mt-2" style="grid-column: 1/-1;" disabled>
                                ⬇ Agregar al Carrito
                            </button>
                        </form>
                    </div>

                    <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                        <h3 class="font-bold text-muted mb-4">🛒 Carrito</h3>
                        <div class="table-wrap" style="flex: 1; overflow-y: auto;">
                            <table class="app-table">
                                <thead>
                                    <tr><th>Cant.</th><th>Producto</th><th>P.U.</th><th>Total</th><th></th></tr>
                                </thead>
                                <tbody id="cartTable"></tbody>
                            </table>
                        </div>
                    </div>
                    
                </div>

                <div class="pos-right">
                    <div class="card">
                        <div class="doc-selector">
                            <label style="flex:1;">
                                <input type="radio" name="docType" value="boleta" checked onchange="toggleClientFields()">
                                <div class="doc-option">📄 BOLETA</div>
                            </label>
                            <label style="flex:1;">
                                <input type="radio" name="docType" value="factura" onchange="toggleClientFields()">
                                <div class="doc-option">🏢 FACTURA</div>
                            </label>
                        </div>

                        <div class="form-grid" style="gap:10px; margin-bottom: 15px;">
                            <div class="form-group">
                                <input id="clientDoc" placeholder="DNI / RUC" maxlength="11">
                            </div>
                            <div class="form-group">
                                <input id="clientName" placeholder="Nombre Cliente">
                            </div>
                        </div>
                        <div id="rucAlert" class="text-danger hidden mb-4" style="font-size:12px;">⚠ RUC y Razón Social obligatorios.</div>

                        <div class="total-box">
                            <small class="text-muted">TOTAL A PAGAR</small>
                            <div id="totalDisplay" class="total-amount">S/ 0.00</div>
                        </div>
                        
                        <div class="flex gap-2 mt-4">
                            <button id="btnCancel" class="btn btn-ghost w-full">Limpiar</button>
                            <button id="btnProcess" class="btn btn-primary w-full" style="background:var(--success);">
                                Cobrar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="./pos.js"></script>
</body>
</html>
