<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Inventario - Ferretería Molina</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        .col-price { font-family: 'Consolas', monospace; font-weight: 600; color: var(--text-main); }
        .col-stock { font-weight: 700; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand"><div class="logo">FM</div><h2>Ferretería Molina</h2></div>
            <nav class="menu">
                <a href="../home/index.html">🏠 Inicio</a>
                <a href="list.html" class="active">📦 Productos</a>
                <a href="../sales/daily.html">🧾 Ventas</a>
                <a href="../providers/list.html">👥 Proveedores</a>
                <a href="../users/list.html">👤 Usuarios</a>
                <a href="../users/roles.html">🔑 Roles</a>
                <a href="../sales/history.html">📊 Historial</a>
                <a href="../settings/settings.html">⚙ Configuración</a>
                <a href="../auth/login.html" class="btn-logout">🔓 Salir</a>
            </nav>
        </aside>

        <main class="main">
            <div class="header">
                <div class="title">
                    <h1>Inventario</h1>
                    <p>Gestión de productos y precios</p>
                </div>
                <div class="flex gap-4">
                    <div class="search-bar">
                        <span>🔍</span>
                        <input id="searchInput" placeholder="Buscar producto...">
                    </div>
                    <a href="form.html" class="btn btn-primary">+ Nuevo Producto</a>
                </div>
            </div>

            <div class="table-container">
                <div class="table-wrap">
                    <table class="app-table" id="productsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Producto</th>
                                <th>Costo</th>
                                <th>Venta 10%</th>
                                <th>Venta 20%</th>
                                <th>Venta 30%</th>
                                <th>Venta 40%</th>
                                <th>Venta 50%</th>
                                <th>Stock</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div id="loading" class="text-center text-muted" style="padding: 20px;">Cargando inventario...</div>
            </div>
        </main>
    </div>
    <script src="./list.js"></script>
</body>
</html>
