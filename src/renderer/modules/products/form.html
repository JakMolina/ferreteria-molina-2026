<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Gestión Producto - Ferretería Molina</title>
    <link rel="stylesheet" href="../../styles/style.css">
    <style>
        .dynamic-section {
            background: #f8fafc;
            border: 1px dashed var(--primary);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            grid-column: 1 / -1;
        }
        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand"><div class="logo">FM</div><h2>Ferretería Molina</h2></div>
            <nav class="menu">
                <a href="../home/index.html">🏠 Inicio</a>
                <a href="list.html" class="active">📦 Productos</a>
                <a href="../sales/daily.html">🧾 Ventas</a>
                <a href="../providers/list.html">👥 Proveedores</a>
                <a href="../users/list.html">👤 Usuarios</a>
                <a href="../users/roles.html">🔑 Roles</a>
                <a href="../sales/history.html">📊 Historial</a>
                <a href="../settings/settings.html">⚙ Configuración</a>
                <a href="../auth/login.html" class="btn-logout">🔓 Salir</a>
            </nav>
        </aside>

        <main class="main">
            <div class="header">
                <div class="title">
                    <h1 id="pageTitle">Registrar Producto</h1>
                    <p class="text-muted" id="pageSubtitle">Información del ítem</p>
                </div>
            </div>

            <div class="card" style="max-width: 900px; margin: 0 auto;">
                <form id="productForm" class="form-grid">
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Tipo de Producto *</label>
                        <select id="productType" required class="w-full">
                            <option value="general">Estándar / General</option>
                            </select>
                    </div>

                    <div class="form-group">
                        <label>Nombre del Producto *</label>
                        <input id="name" type="text" required placeholder="Ej. Taladro Percutor" autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label>Categoría</label>
                        <input id="category" type="text" list="categories" placeholder="Seleccione o escriba">
                        <datalist id="categories">
                            <option value="Herramientas"><option value="Construcción"><option value="Plomería"><option value="Electricidad">
                        </datalist>
                    </div>

                    <div id="dynamicFieldsContainer" class="dynamic-section form-grid" style="display: none;">
                        <div class="section-title" style="grid-column: 1/-1;">Especificaciones Técnicas</div>
                        </div>

                    <div class="form-group">
                        <label>Precio Costo (S/)</label>
                        <input id="cost_price" type="number" step="0.01" min="0" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Precio Venta (S/) *</label>
                        <input id="price" type="number" step="0.01" min="0" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label>Stock Total Inicial *</label>
                        <input id="stock" type="number" step="0.01" min="0" required placeholder="0">
                        <small id="stockHelp" class="text-muted"></small>
                    </div>

                    <div class="form-group">
                        <label>Proveedor</label>
                        <div class="flex gap-2">
                            <select id="provider" style="flex:1;">
                                <option value="">Cargando...</option>
                            </select>
                            <a href="../providers/form.html" class="btn btn-ghost btn-icon" title="Nuevo Proveedor">+</a>
                        </div>
                    </div>

                    <div id="lotSection" class="dynamic-section form-grid" style="display: none;">
                        <div class="section-title" style="grid-column: 1/-1;">Lote Inicial y Vencimiento</div>
                        <div class="form-group">
                            <label>Número de Lote *</label>
                            <input id="lot_number" type="text" placeholder="Ej. L-2026-05">
                        </div>
                        <div class="form-group" id="expirationGroup" style="display: none;">
                            <label>Fecha de Vencimiento *</label>
                            <input id="expiration_date" type="date">
                        </div>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1; margin-top: 15px;">
                        <label>Descripción / Notas</label>
                        <textarea id="description" rows="3" placeholder="Detalles adicionales..."></textarea>
                    </div>

                    <div class="flex justify-end gap-2 mt-4" style="grid-column: 1 / -1;">
                        <a href="list.html" class="btn btn-ghost">Cancelar</a>
                        <button type="submit" id="saveBtn" class="btn btn-primary">Guardar Producto</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="./form.js"></script>
</body>
</html>
